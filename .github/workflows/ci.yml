name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep jq

      - name: Verify shell scripts and harness tooling
        run: |
          chmod +x script/*.sh 2>/dev/null || true
          chmod +x script/* test/*.sh .githooks/pre-commit
          test/test_scripts.sh
